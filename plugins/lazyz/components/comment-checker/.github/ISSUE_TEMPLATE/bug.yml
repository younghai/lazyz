name: Bug Report
description: Report broken Codex hook, MCP, or comment-checking behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Include the Codex tool payload, hook output, and plugin version needed to reproduce.

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include exact output/errors.
    validations:
      required: true

  - type: textarea
    id: payload
    attributes:
      label: Tool payload
      description: Paste the minimal PostToolUse or MCP payload that reproduces the issue.
      render: json
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: codex-comment-checker version
      placeholder: 0.1.0
    validations:
      required: false
