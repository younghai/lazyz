interface:
  display_name: "(LazyZ) lcx-report-bug"
  short_description: "Route LazyCodex or Codex bugs with source evidence"
  search_terms:
    - "lcx-report-bug"
    - "lazycodex bug"
    - "lazycodex issue"
    - "omo-codex bug"
    - "openai codex bug"
    - "codex upstream issue"
  default_prompt: "Use $lcx-report-bug to investigate this LazyCodex or Codex bug, compare LazyCodex evidence with /tmp openai/codex source, choose the correct GitHub repo, and file an issue or PR with reproduction, root cause, fix guidance, and the required LazyCodex footer."
